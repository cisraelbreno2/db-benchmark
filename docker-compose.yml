version: '3.8'
services:
  postgres:
    image: postgres:16
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: benchmark
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7.0
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    ports:
      - "27017:27017"

  cassandra:
    image: cassandra:4.1
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=BenchmarkCluster
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=256M
      - JVM_OPTS=-Xms1G -Xmx1G
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 10s
      timeout: 5s
      retries: 10

  init-cassandra:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    command: >
      bash -c "cqlsh cassandra -e \"CREATE KEYSPACE IF NOT EXISTS benchmark WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};\""
